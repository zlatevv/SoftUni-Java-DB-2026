<th:block th:fragment xmlns:th="http://www.w3.org/1999/xhtml">
    <div class="container justify-content-center mt-3">
        <div class="jumbotron jumbotron-background d-flex justify-content-center">
            <div class="container">
                <div class="col-md-12 d-flex justify-content-center">
                    <h1 class="myBackgroundColor">Import JSON</h1>
                </div>
                <hr class="hr-background my-hr"/>
                <div th:if="${areImported[0] == false && areImported[1] == false && areImported[2] == false}" class="col-md-12 d-flex justify-content-center">
                    <h4 class="myBackgroundColor">Click the buttons below to import JSON.</h4>
                </div>
                <div class="col-md-12 d-flex justify-content-center">
                    <th:block th:if="${areImported[0] == false}">
                        <a class="btn btn-primary mx-5 my-5" th:href="@{/import/constellations}">Import Constellation</a>
                    </th:block>
                    <th:block th:if="${areImported[1] == false}">
                        <a class="btn btn-primary mx-5 my-5" th:href="@{/import/stars}">Import Stars</a>
                    </th:block>
                    <th:block th:if="${areImported[2] == false}">
                        <a class="btn btn-primary mx-5 my-5" th:href="@{/import/astronomers}">Import Astronomers</a>
                    </th:block>
                    <th:block th:if="${areImported[0] == true && areImported[1] == true && areImported[2] == true}">
                        <div class="d-flex flex-column align-items-center">
                            <p class="myBackgroundColor">All JSON files are imported.</p>
                            <a class="btn btn-primary mx-5 mt-3" th:href="@{/export/red-giant-stars}">Export stars</a>
                        </div>
                    </th:block>
                </div>
            </div>
        </div>
    </div>
</th:block>
